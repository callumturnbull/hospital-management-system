name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate SSL certificates
        run: |
          mkdir -p ssl
          openssl req -x509 -newkey rsa:4096 -keyout ssl/private.key -out ssl/certificate.pem -days 365 -nodes -subj "/CN=callum-hospital.uksouth.azurecontainer.io"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: callumteesside/hospital-app:latest